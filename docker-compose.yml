version: '3.8'

services:
  # Servicio 1: La Base de Datos MariaDB
  db:
    image: mariadb:latest
    container_name: pokemon_mariadb
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: pokemon_db
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "healthcheck.sh", "--connect", "--innodb_initialized" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # Servicio 2: Tu aplicación en Express
  web:
    build: .
    container_name: pokemon_express_app
    restart: always
    ports:
      - "3000:3000"
    environment:
      - DB_HOST=db
    depends_on:
      db:
        condition: service_healthy

volumes:
  mariadb_data:
